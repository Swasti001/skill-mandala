services:
  - type: web
    name: skill-mandala-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: RENDER_DB_URL
        fromDatabase:
          name: fyp-database
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fyp-database
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fyp-database
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: fyp-database
    plan: free
