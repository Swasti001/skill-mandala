services:
  - type: web
    name: skill-mandala-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: fyp-database
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fyp-database
          property: port
      - key: DB_NAME
        fromDatabase:
          name: fyp-database
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fyp-database
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fyp-database
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: fyp-database
    plan: free
